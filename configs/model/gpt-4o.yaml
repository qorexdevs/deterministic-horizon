# GPT-4o Model Configuration
# ===========================

model:
  name: gpt-4o
  provider: openai
  model_id: gpt-4o-2024-11-20
  
  # Generation parameters
  temperature: 0.0
  max_tokens: 4096
  top_p: 1.0
  
  # API settings
  api_base: https://api.openai.com/v1
  timeout: 120
  max_retries: 3
  
  # Pricing (USD per 1K tokens, as of Jan 2026)
  pricing:
    input: 0.0025
    output: 0.01
  
  # Capabilities
  capabilities:
    tool_use: true
    vision: true
    streaming: true
    system_prompt: true
